<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>S.T.R.O - Redirecionando...</title>
  <script>
    (function() {
      // Verifica se a largura da tela é menor que 768px ou se o navegador é mobile
      const isMobile = (window.innerWidth <= 768) || /Mobi|Android/i.test(navigator.userAgent);
      
      if (isMobile) {
        // Redireciona para o painel mobile
        window.location.replace('mobile.html');
      } else {
        // Redireciona para a versão de PC
        window.location.replace('pc.html');
      }
    })();
  </script>
</head>
<body style="background-color: #090a0f; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px;">
  <p>Carregando S.T.R.O...</p>
</body>
</html>
